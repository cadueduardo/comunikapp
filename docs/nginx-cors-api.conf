# =============================================================================
# CORS para api.comunikapp.com.br (Nginx)
# =============================================================================
# O header Access-Control-Allow-Origin só pode ter UMA origem por resposta.
# Por isso usamos um map que reflete a Origin do request quando ela é permitida.
#
# PASSO 1 - Dentro de http { } no nginx.conf (ou em um arquivo incluído em http):
# ------------------------------------------------------------------------------
# map $http_origin $cors_origin {
#     default "";
#     "https://comunikapp.com.br" "https://comunikapp.com.br";
#     "https://www.comunikapp.com.br" "https://www.comunikapp.com.br";
# }
#
# PASSO 2 - Dentro do server { } que tem server_name api.comunikapp.com.br:
# ------------------------------------------------------------------------------
# include /opt/comunikapp/docs/nginx-cors-api.conf;   # ou o path real deste arquivo
# (O include traz apenas o bloco "location" abaixo; o map fica no passo 1.)
# =============================================================================

# Responder OPTIONS (preflight) com 204 e headers CORS
if ($request_method = 'OPTIONS') {
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, HEAD, PUT, PATCH, POST, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Authorization, x-loja-id, x-user-roles, x-internal-token, Cache-Control, Pragma' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Max-Age' 86400 always;
    add_header 'Content-Length' 0 always;
    add_header 'Content-Type' 'text/plain charset=UTF-8' always;
    return 204;
}

# Em todas as respostas da API (inclui 4xx/5xx por causa do "always")
add_header 'Access-Control-Allow-Origin' $cors_origin always;
add_header 'Access-Control-Allow-Credentials' 'true' always;
add_header 'Access-Control-Allow-Methods' 'GET, HEAD, PUT, PATCH, POST, DELETE, OPTIONS' always;
add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Authorization, x-loja-id, x-user-roles, x-internal-token, Cache-Control, Pragma' always;
