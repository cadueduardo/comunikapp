# =============================================================================
# api.comunikapp.com.br -> backend NestJS em 127.0.0.1:4001
# =============================================================================
# Premissas:
#   - O bloco `map $http_origin $cors_origin {...}` está em /etc/nginx/conf.d/cors-map.conf
#     (incluído no `http {}` pelo nginx.conf via `include /etc/nginx/conf.d/*.conf;`).
#   - O backend está com CORS_VIA_PROXY=true no .env (não envia headers CORS).
#   - O `proxy_hide_header` abaixo é cinto-e-suspensório: se um dia o backend voltar a
#     enviar CORS, ainda assim NÃO haverá header duplicado.
#
# Instalação:
#   sudo cp /opt/comunikapp/app/deploy/nginx/api.comunikapp.com.br.conf \
#           /etc/nginx/sites-available/api.comunikapp.com.br.conf
#   sudo ln -sf /etc/nginx/sites-available/api.comunikapp.com.br.conf \
#               /etc/nginx/sites-enabled/api.comunikapp.com.br.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt - apenas DEPOIS do DNS apontar para a VPS):
#   sudo certbot --nginx -d api.comunikapp.com.br
# =============================================================================

# --- Redireciona HTTP -> HTTPS (Certbot atualiza este bloco automaticamente) ---
server {
    listen 80;
    listen [::]:80;
    server_name api.comunikapp.com.br;

    # ACME challenge para Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    # Compatível com Nginx 1.24 da VPS atual (sem diretiva `http2 on;`).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.comunikapp.com.br;

    # SSL - certificado emitido pelo Certbot (Let's Encrypt) como SAN cobrindo
    # comunikapp.com.br, api.comunikapp.com.br e www.comunikapp.com.br.
    # Por isso o path é `/etc/letsencrypt/live/comunikapp.com.br/` (e NÃO `.../api.comunikapp.com.br/`).
    # Para renovar/incluir outro domínio:
    #   sudo certbot --nginx -d comunikapp.com.br -d api.comunikapp.com.br -d www.comunikapp.com.br --expand
    ssl_certificate     /etc/letsencrypt/live/comunikapp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comunikapp.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Headers de segurança básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS - habilite só depois que o SSL estiver 100% funcionando
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Tamanho máximo de upload (alinhado com MAX_FILE_SIZE do backend - 5 MB + folga)
    client_max_body_size 25M;

    # Timeouts confortáveis para uploads/relatórios
    proxy_connect_timeout 30s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    send_timeout          120s;

    location /api/docs {
        return 404;
    }

    location /test- {
        return 404;
    }

    location /debug {
        return 404;
    }

    location /uploads/arte/ {
        return 404;
    }

    location / {
        # =====================================================================
        # CORS - preflight (OPTIONS) respondido pelo Nginx, sem ir ao upstream.
        # `if` precisa estar dentro de `location` (no Nginx, `add_header` dentro de
        # `if` só é permitido em contexto location, não em server).
        # =====================================================================
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods'     'GET, HEAD, PUT, PATCH, POST, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Content-Type, Accept, Authorization, x-loja-id, x-user-roles, x-internal-token, Cache-Control, Pragma' always;
            add_header 'Access-Control-Expose-Headers'    'Content-Length' always;
            add_header 'Access-Control-Max-Age'           86400 always;
            add_header 'Content-Length'                   0 always;
            add_header 'Content-Type'                     'text/plain charset=UTF-8' always;
            return 204;
        }

        # =====================================================================
        # GUARDRAIL: bloquear qualquer header CORS que o upstream tente enviar,
        # garantindo que apenas o Nginx os emita (evita duplicação).
        # =====================================================================
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        # CORS - aplicado a TODAS as respostas (inclusive 4xx/5xx por causa do `always`)
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods'     'GET, HEAD, PUT, PATCH, POST, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Content-Type, Accept, Authorization, x-loja-id, x-user-roles, x-internal-token, Cache-Control, Pragma' always;
        add_header 'Access-Control-Expose-Headers'    'Content-Length' always;

        # Proxy reverso para o NestJS (escutando apenas em 127.0.0.1:4001)
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Suporte a WebSocket (Socket.IO usado pelo módulo Arte&Aprovação)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
