# =============================================================================
# CORS map - deve ficar DENTRO de `http { }` do nginx.conf
# =============================================================================
# Lê o header Origin do request e reflete na resposta APENAS se a origem for permitida.
# (Nunca enviar "*" porque usamos credenciais.)
#
# Instalação:
#   sudo cp /opt/comunikapp/app/deploy/nginx/cors-map.conf /etc/nginx/conf.d/cors-map.conf
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

map $http_origin $cors_origin {
    default                              "";
    "https://comunikapp.com.br"          "https://comunikapp.com.br";
    "https://www.comunikapp.com.br"      "https://www.comunikapp.com.br";
    "http://localhost:3000"              "http://localhost:3000";
    "http://127.0.0.1:3000"              "http://127.0.0.1:3000";
}
