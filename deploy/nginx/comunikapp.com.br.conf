# =============================================================================
# comunikapp.com.br + www.comunikapp.com.br -> frontend Next.js em 127.0.0.1:3001
# =============================================================================
# Instalação:
#   sudo cp /opt/comunikapp/app/deploy/nginx/comunikapp.com.br.conf \
#           /etc/nginx/sites-available/comunikapp.com.br.conf
#   sudo ln -sf /etc/nginx/sites-available/comunikapp.com.br.conf \
#               /etc/nginx/sites-enabled/comunikapp.com.br.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt - apenas DEPOIS do DNS apontar para a VPS):
#   sudo certbot --nginx -d comunikapp.com.br -d www.comunikapp.com.br
# =============================================================================

# --- Redirect HTTP -> HTTPS (Certbot ajusta automaticamente) ---
server {
    listen 80;
    listen [::]:80;
    server_name comunikapp.com.br www.comunikapp.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Redirect www -> apex (sob HTTPS) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.comunikapp.com.br;

    ssl_certificate     /etc/letsencrypt/live/comunikapp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comunikapp.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://comunikapp.com.br$request_uri;
}

# --- HTTPS principal -> Next.js ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name comunikapp.com.br;

    ssl_certificate     /etc/letsencrypt/live/comunikapp.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comunikapp.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25M;

    # Cache de assets estáticos do Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Suporte a HMR/WebSocket do Next quando necessário
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
