# =============================================================================
# api.comunikapp.com.br - VARIANTE HTTP-ONLY (apenas para emitir o cert SSL)
# =============================================================================
# Use este arquivo APENAS quando NÃO existir ainda certificado SSL para o subdomínio
# (ou ele tiver sido removido). O fluxo é:
#
#   1. sudo cp /opt/comunikapp/app/deploy/nginx/api.comunikapp.com.br.http-only.conf \
#              /etc/nginx/sites-available/api.comunikapp.com.br.conf
#   2. sudo nginx -t && sudo systemctl reload nginx
#   3. sudo certbot certonly --webroot -w /var/www/certbot -d api.comunikapp.com.br \
#          --non-interactive --agree-tos -m seu@email.com
#   4. sudo cp /opt/comunikapp/app/deploy/nginx/api.comunikapp.com.br.conf \
#              /etc/nginx/sites-available/api.comunikapp.com.br.conf
#   5. sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name api.comunikapp.com.br;

    # ACME challenge - obrigatório para o Certbot emitir o cert
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Tudo o resto: por enquanto, 503 (em emissão de SSL)
    location / {
        return 503;
    }
}
